<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fonvo Admin — AI Configuration</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#fffbeb',
              100: '#fef3c7',
              200: '#fde68a',
              300: '#fcd34d',
              400: '#fbbf24',
              500: '#f59e0b',
              600: '#d97706',
              700: '#b45309',
              800: '#92400e',
              900: '#78350f',
            },
            sidebar: {
              bg: '#1e1e2e',
              hover: '#2a2a3e',
              active: '#33334d',
              text: '#cdd6f4',
              muted: '#6c7086',
            }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50 text-gray-900 h-screen flex flex-col overflow-hidden">

  <!-- ============ LOGIN SCREEN ============ -->
  <div id="loginScreen" class="flex-1 flex items-center justify-center bg-sidebar-bg">
    <div class="w-full max-w-sm px-6">
      <div class="text-center mb-8">
        <div class="w-14 h-14 bg-brand-500 rounded-2xl flex items-center justify-center mx-auto mb-4">
          <span class="text-white font-bold text-xl">F</span>
        </div>
        <h1 class="text-white font-semibold text-2xl">Fonvo Admin</h1>
        <p class="text-sidebar-muted text-sm mt-1">AI Configuration Panel</p>
      </div>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="space-y-4">
          <div>
            <label class="block text-sidebar-muted text-xs font-medium mb-1.5">Username</label>
            <input
              id="loginUsername"
              type="text"
              autocomplete="username"
              class="w-full bg-sidebar-hover text-sidebar-text rounded-lg px-4 py-3 border border-gray-600 focus:border-brand-500 focus:outline-none text-sm"
              required
            >
          </div>
          <div>
            <label class="block text-sidebar-muted text-xs font-medium mb-1.5">Password</label>
            <input
              id="loginPassword"
              type="password"
              autocomplete="current-password"
              class="w-full bg-sidebar-hover text-sidebar-text rounded-lg px-4 py-3 border border-gray-600 focus:border-brand-500 focus:outline-none text-sm"
              required
            >
          </div>
          <div id="loginError" class="text-red-400 text-sm text-center hidden"></div>
          <button
            type="submit"
            id="loginBtn"
            class="w-full bg-brand-500 text-white font-medium rounded-lg px-4 py-3 text-sm hover:bg-brand-600 disabled:opacity-50 transition-colors"
          >
            Log in
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- ============ MAIN APP (hidden until auth) ============ -->
  <div id="mainApp" class="flex-1 flex flex-col overflow-hidden hidden">

    <!-- Header -->
    <header class="bg-sidebar-bg border-b border-gray-700 px-6 py-3 flex items-center justify-between shrink-0">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-brand-500 rounded-lg flex items-center justify-center">
          <span class="text-white font-bold text-sm">F</span>
        </div>
        <h1 class="text-white font-semibold text-lg">Fonvo Admin</h1>
        <span class="text-sidebar-muted text-sm">— AI Configuration</span>
      </div>
      <div class="flex items-center gap-3">
        <span id="connectionStatus" class="text-xs px-2 py-1 rounded-full bg-gray-700 text-sidebar-muted">Connecting...</span>
        <button onclick="handleLogout()" class="text-xs px-3 py-1.5 rounded-lg bg-gray-700 text-sidebar-muted hover:bg-gray-600 hover:text-sidebar-text transition-colors">
          Log out
        </button>
      </div>
    </header>

    <!-- Tabs -->
    <div class="bg-white border-b border-gray-200 px-6 shrink-0">
      <nav class="flex gap-1">
        <button id="tabPrompts" class="tab-btn active px-4 py-3 text-sm font-medium border-b-2 border-brand-500 text-brand-700" onclick="switchTab('prompts')">
          Prompts
        </button>
        <button id="tabModels" class="tab-btn px-4 py-3 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700" onclick="switchTab('models')">
          Models
        </button>
      </nav>
    </div>

    <!-- Content -->
    <div class="flex-1 flex overflow-hidden">

      <!-- === PROMPTS TAB === -->
      <div id="promptsTab" class="flex-1 flex">

        <!-- Sidebar -->
        <aside class="w-72 bg-sidebar-bg border-r border-gray-700 flex flex-col shrink-0">
          <!-- Search -->
          <div class="p-3 border-b border-gray-700">
            <input
              id="promptSearch"
              type="text"
              placeholder="Search prompts..."
              class="w-full bg-sidebar-hover text-sidebar-text text-sm rounded-lg px-3 py-2 border border-gray-600 focus:border-brand-500 focus:outline-none placeholder-sidebar-muted"
              oninput="filterPrompts()"
            >
          </div>
          <!-- Prompt List -->
          <div id="promptList" class="flex-1 overflow-y-auto py-2">
            <div class="px-3 py-4 text-center text-sidebar-muted text-sm">Loading prompts...</div>
          </div>
        </aside>

        <!-- Editor -->
        <main id="promptEditor" class="flex-1 flex flex-col overflow-hidden">
          <!-- Empty state -->
          <div id="promptEmpty" class="flex-1 flex items-center justify-center text-gray-400">
            <div class="text-center">
              <svg class="w-16 h-16 mx-auto mb-4 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
              </svg>
              <p class="text-sm">Select a prompt to edit</p>
            </div>
          </div>

          <!-- Editor form (hidden by default) -->
          <div id="promptForm" class="flex-1 flex flex-col overflow-hidden hidden">
            <!-- Toolbar -->
            <div class="px-6 py-4 border-b border-gray-200 bg-white flex items-center justify-between shrink-0">
              <div>
                <h2 id="promptKey" class="font-mono text-lg font-semibold text-gray-800"></h2>
                <p id="promptMeta" class="text-xs text-gray-400 mt-1"></p>
              </div>
              <div class="flex items-center gap-3">
                <span id="promptUnsaved" class="text-xs text-brand-600 font-medium hidden">Unsaved changes</span>
                <button id="promptSaveBtn" onclick="saveCurrentPrompt()" class="px-4 py-2 bg-brand-500 text-white text-sm font-medium rounded-lg hover:bg-brand-600 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                  Save
                </button>
              </div>
            </div>

            <!-- Scrollable content -->
            <div class="flex-1 overflow-y-auto p-6 space-y-5">
              <!-- Description -->
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                <textarea
                  id="promptDescription"
                  rows="2"
                  class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:border-brand-500 focus:ring-1 focus:ring-brand-500 focus:outline-none resize-none"
                  oninput="markPromptDirty()"
                ></textarea>
              </div>

              <!-- Prompt Text -->
              <div class="flex-1">
                <label class="block text-sm font-medium text-gray-700 mb-1">Prompt Template</label>
                <textarea
                  id="promptText"
                  class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm font-mono leading-relaxed focus:border-brand-500 focus:ring-1 focus:ring-brand-500 focus:outline-none resize-y"
                  style="min-height: 250px"
                  oninput="markPromptDirty(); updatePreview()"
                ></textarea>
              </div>

              <!-- Placeholders -->
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Placeholders</label>
                <div id="promptPlaceholders" class="flex flex-wrap gap-2 mb-2"></div>
                <div class="flex gap-2">
                  <input
                    id="newPlaceholder"
                    type="text"
                    placeholder="Add placeholder..."
                    class="border border-gray-300 rounded-lg px-3 py-1.5 text-sm focus:border-brand-500 focus:outline-none"
                    onkeydown="if(event.key==='Enter'){addPlaceholder();event.preventDefault()}"
                  >
                  <button onclick="addPlaceholder()" class="px-3 py-1.5 text-sm bg-gray-100 border border-gray-300 rounded-lg hover:bg-gray-200 transition-colors">Add</button>
                </div>
              </div>

              <!-- Preview -->
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Preview (with highlighted placeholders)</label>
                <div id="promptPreview" class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm font-mono leading-relaxed bg-gray-50 whitespace-pre-wrap break-words max-h-64 overflow-y-auto"></div>
              </div>
            </div>
          </div>
        </main>
      </div>

      <!-- === MODELS TAB === -->
      <div id="modelsTab" class="flex-1 hidden overflow-y-auto">
        <div class="max-w-5xl mx-auto p-6">
          <!-- Hint -->
          <div class="mb-6 bg-blue-50 border border-blue-200 rounded-lg p-4 text-sm text-blue-800">
            <strong>Common models:</strong>
            OpenAI: <code class="bg-blue-100 px-1 rounded">gpt-4o</code>, <code class="bg-blue-100 px-1 rounded">gpt-4o-mini</code>
            | OpenRouter: <code class="bg-blue-100 px-1 rounded">gemini-2.5-flash</code>
            | ElevenLabs: <code class="bg-blue-100 px-1 rounded">eleven_flash_v2_5</code>
            | Deepgram: <code class="bg-blue-100 px-1 rounded">nova-3</code>
          </div>

          <!-- Model cards -->
          <div id="modelList" class="space-y-4">
            <div class="text-center text-gray-400 py-12">Loading models...</div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-6 right-6 z-50 hidden">
    <div class="px-4 py-3 rounded-lg shadow-lg text-sm font-medium flex items-center gap-2"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
